openapi: 3.0.1
info:
  title: LDM OSLC service API
  description: An OpenAPI specification of OSLC Link Discovery Management services
  version: "1.0"
servers:
  - url: http://localhost:8080
    description: Generated server url
paths:
  /discover-links:
    post:
      tags:
        - link-index-controller
      operationId: discoverLinks
      parameters:
        - name: Configuration-Context
          in: header
          required: false
          schema:
            type: string
            format: uri
      requestBody:
        content:
          application/rdf+xml: {}
          text/turtle: {}
          application/ld+json: {}
        required: true
      responses:
        "200":
          description: OK
          content:
            application/rdf+xml: {}
            text/turtle: {}
            application/ld+json: {}
        "400":
          description: Bad request
  /get-contributors:
    get:
      operationId: getLinkContributors
      responses:
        default:
          description: default response
          content:
            application/rdf+xml: {}
            text/turtle: {}
            application/ld+json: {}
